<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SYC-TOOL · 悬浮球演示</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        min-width: 68px;
        min-height: 68px;
        overflow: hidden;
        background: transparent !important;
        user-select: none;
        -webkit-user-select: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      svg {
        display: block;
        overflow: visible;
      }

      #ball-group {
        opacity: 0;
        transform: scale(0.9);
        transform-origin: 34px 34px;
        transition:
          opacity 0.14s cubic-bezier(0.22, 1, 0.36, 1),
          transform 0.14s cubic-bezier(0.22, 1, 0.36, 1);
      }
      body.is-visible #ball-group {
        opacity: 1;
        transform: scale(1);
      }

      #pet-float {
        transform-origin: 34px 34px;
        animation: pet-float 3.4s ease-in-out infinite;
      }
      #pet-body-wrap {
        transform-origin: 34px 36px;
        animation: pet-breathe 2.8s ease-in-out infinite;
      }

      @keyframes pet-float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-3.5px);
        }
      }
      @keyframes pet-breathe {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.045);
        }
      }

      body.is-sleep #pet-float {
        animation: pet-float-sleep 4.8s ease-in-out infinite !important;
      }
      @keyframes pet-float-sleep {
        0%,
        100% {
          transform: translateY(1px);
        }
        50% {
          transform: translateY(-1px);
        }
      }
      body.is-sleep #pet-body-wrap {
        animation: pet-breathe-sleep 4.2s ease-in-out infinite !important;
      }
      @keyframes pet-breathe-sleep {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.02);
        }
      }

      #pet-float.is-hop {
        animation: pet-hop 0.62s cubic-bezier(0.34, 1.45, 0.64, 1) !important;
      }
      @keyframes pet-hop {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        28% {
          transform: translateY(-9px) rotate(-4deg);
        }
        48% {
          transform: translateY(-1px) rotate(3deg);
        }
        68% {
          transform: translateY(-4px) rotate(-2deg);
        }
      }

      #pet-face {
        transform-origin: 34px 31px;
        transition: transform 0.12s ease-out;
      }

      .face-awake {
        opacity: 1;
      }
      .face-sleep,
      .face-angry {
        opacity: 0;
        pointer-events: none;
      }
      body.is-sleep .face-awake,
      body.is-angry .face-awake {
        opacity: 0;
      }
      body.is-sleep .face-sleep {
        opacity: 1;
      }
      body.is-angry .face-angry {
        opacity: 1;
      }

      .pet-eye {
        transform-origin: center;
        transform-box: fill-box;
        animation: pet-blink 4.2s ease-in-out infinite;
      }
      .pet-eye-right {
        animation-delay: 0.12s;
      }
      @keyframes pet-blink {
        0%,
        44%,
        48%,
        100% {
          transform: scaleY(1);
        }
        46% {
          transform: scaleY(0.15);
        }
      }
      body.is-sleep .pet-eye,
      body.is-angry .pet-eye {
        animation: none !important;
      }

      .pet-sparkle {
        opacity: 0;
        transform-origin: center;
        transform-box: fill-box;
        animation: pet-sparkle 2.6s ease-in-out infinite;
      }
      .sparkle-a {
        animation-delay: 0s;
      }
      .sparkle-b {
        animation-delay: 0.85s;
      }
      .sparkle-c {
        animation-delay: 1.7s;
      }
      @keyframes pet-sparkle {
        0%,
        70%,
        100% {
          opacity: 0;
          transform: scale(0.3) rotate(0deg);
        }
        78% {
          opacity: 0.95;
          transform: scale(1) rotate(18deg);
        }
        88% {
          opacity: 0;
          transform: scale(0.5) rotate(36deg);
        }
      }
      body.is-sleep .pet-sparkle,
      body.is-angry .pet-sparkle {
        animation: none !important;
        opacity: 0 !important;
      }

      .pet-blush {
        animation: pet-blush 3s ease-in-out infinite;
      }
      @keyframes pet-blush {
        0%,
        100% {
          opacity: 0.45;
        }
        50% {
          opacity: 0.72;
        }
      }
      body.is-angry .pet-blush-angry {
        animation: pet-blush-angry 0.35s ease-in-out infinite alternate;
      }
      @keyframes pet-blush-angry {
        0% {
          opacity: 0.75;
        }
        100% {
          opacity: 1;
        }
      }

      .pet-zzz {
        opacity: 0;
        transform-origin: center;
        transform-box: fill-box;
        font-size: 9px;
        fill: #8b7355;
        font-weight: 700;
        pointer-events: none;
      }
      body.is-sleep .pet-zzz {
        opacity: 1;
      }
      .zzz-a {
        animation: pet-zzz 2.4s ease-in-out infinite;
      }
      .zzz-b {
        animation: pet-zzz 2.4s ease-in-out 0.55s infinite;
      }
      .zzz-c {
        animation: pet-zzz 2.4s ease-in-out 1.1s infinite;
      }
      @keyframes pet-zzz {
        0%,
        100% {
          opacity: 0;
          transform: translate(0, 0) scale(0.6);
        }
        35%,
        65% {
          opacity: 0.9;
          transform: translate(3px, -6px) scale(1);
        }
      }

      .pet-steam {
        opacity: 0;
        transform-origin: center;
        transform-box: fill-box;
        font-size: 10px;
        fill: #c45c4a;
        pointer-events: none;
      }
      body.is-angry .pet-steam {
        opacity: 1;
      }
      .steam-a {
        animation: pet-steam 0.55s ease-out infinite;
      }
      .steam-b {
        animation: pet-steam 0.55s ease-out 0.2s infinite;
      }
      @keyframes pet-steam {
        0% {
          opacity: 0;
          transform: translateY(4px) scale(0.5);
        }
        40% {
          opacity: 0.85;
          transform: translateY(-2px) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateY(-10px) scale(0.7);
        }
      }

      body.is-angry #pet-float {
        animation: pet-angry-shake 0.28s ease-in-out infinite !important;
      }
      @keyframes pet-angry-shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-1.5px) rotate(-1deg);
        }
        75% {
          transform: translateX(1.5px) rotate(1deg);
        }
      }

      #ball-hit {
        cursor: grab;
      }
      body.is-dragging #ball-hit {
        cursor: grabbing;
      }
      body.is-dragging #pet-float,
      body.is-dragging #pet-body-wrap {
        animation-play-state: paused !important;
      }
      body.is-dragging .pet-eye {
        animation: none;
        transform: scaleY(0.35);
      }
      body.is-dragging .pet-mouth-awake {
        transform: scaleX(1.15);
      }

      body.is-happy #pet-float {
        animation: pet-hop 0.62s cubic-bezier(0.34, 1.45, 0.64, 1) !important;
      }

      @media (prefers-reduced-motion: reduce) {
        #pet-float,
        #pet-body-wrap,
        .pet-eye,
        .pet-sparkle,
        .pet-blush,
        .pet-zzz,
        .pet-steam {
          animation: none !important;
        }
        #pet-face {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <svg width="68" height="68" viewBox="0 0 68 68" aria-hidden="true">
      <defs>
        <linearGradient id="ball-grad" x1="18%" y1="10%" x2="88%" y2="95%">
          <stop offset="0%" stop-color="#fffef8" />
          <stop offset="45%" stop-color="#ffe9a8" />
          <stop offset="100%" stop-color="#f5b800" />
        </linearGradient>
        <linearGradient id="belly-grad" x1="50%" y1="0%" x2="50%" y2="100%">
          <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.9" />
          <stop offset="100%" stop-color="#ffd54f" stop-opacity="0.35" />
        </linearGradient>
        <filter id="ball-shadow" x="-40%" y="-40%" width="180%" height="180%">
          <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.2" />
        </filter>
      </defs>

      <g id="ball-group">
        <g id="pet-float">
          <g id="pet-body-wrap">
            <text class="pet-sparkle sparkle-a" x="14" y="20" font-size="9" fill="#ff9f43">✦</text>
            <text class="pet-sparkle sparkle-b" x="52" y="18" font-size="8" fill="#ffb347">✦</text>
            <text class="pet-sparkle sparkle-c" x="48" y="48" font-size="7" fill="#ffc933">✦</text>

            <text class="pet-zzz zzz-a" x="46" y="16">z</text>
            <text class="pet-zzz zzz-b" x="52" y="12">z</text>
            <text class="pet-zzz zzz-c" x="58" y="8">Z</text>

            <text class="pet-steam steam-a" x="12" y="14">~</text>
            <text class="pet-steam steam-b" x="18" y="10">~</text>

            <circle
              id="ball-hit"
              cx="34"
              cy="34"
              r="26"
              fill="url(#ball-grad)"
              filter="url(#ball-shadow)"
            />
            <ellipse cx="34" cy="38" rx="14" ry="11" fill="url(#belly-grad)" pointer-events="none" />

            <g id="pet-face">
              <!-- 清醒 -->
              <g class="face-awake">
                <ellipse class="pet-blush" cx="24" cy="36" rx="4" ry="2.5" fill="#ff9a8b" opacity="0.55" />
                <ellipse class="pet-blush" cx="44" cy="36" rx="4" ry="2.5" fill="#ff9a8b" opacity="0.55" />
                <ellipse class="pet-eye" cx="27" cy="30" rx="3.2" ry="4" fill="#3d2f0a" />
                <ellipse class="pet-eye pet-eye-right" cx="41" cy="30" rx="3.2" ry="4" fill="#3d2f0a" />
                <circle class="pet-highlight" cx="28.2" cy="28.5" r="1.1" fill="#fff" pointer-events="none" />
                <circle class="pet-highlight pet-highlight-right" cx="42.2" cy="28.5" r="1.1" fill="#fff" pointer-events="none" />
                <path
                  class="pet-mouth-awake"
                  d="M 28 39 Q 34 43 40 39"
                  fill="none"
                  stroke="#5c4510"
                  stroke-width="1.6"
                  stroke-linecap="round"
                  pointer-events="none"
                />
              </g>

              <!-- 睡觉 -->
              <g class="face-sleep">
                <ellipse cx="24" cy="36" rx="4" ry="2.5" fill="#ff9a8b" opacity="0.35" />
                <ellipse cx="44" cy="36" rx="4" ry="2.5" fill="#ff9a8b" opacity="0.35" />
                <path
                  d="M 23 30 Q 27 32 31 30"
                  fill="none"
                  stroke="#3d2f0a"
                  stroke-width="1.5"
                  stroke-linecap="round"
                />
                <path
                  d="M 37 30 Q 41 32 45 30"
                  fill="none"
                  stroke="#3d2f0a"
                  stroke-width="1.5"
                  stroke-linecap="round"
                />
                <path
                  d="M 30 40 Q 34 42 38 40"
                  fill="none"
                  stroke="#5c4510"
                  stroke-width="1.4"
                  stroke-linecap="round"
                />
              </g>

              <!-- 生气 -->
              <g class="face-angry">
                <ellipse class="pet-blush pet-blush-angry" cx="24" cy="36" rx="4.5" ry="2.8" fill="#e85d4a" opacity="0.8" />
                <ellipse class="pet-blush pet-blush-angry" cx="44" cy="36" rx="4.5" ry="2.8" fill="#e85d4a" opacity="0.8" />
                <path
                  d="M 22 27 L 30 29"
                  fill="none"
                  stroke="#3d2f0a"
                  stroke-width="1.6"
                  stroke-linecap="round"
                />
                <path
                  d="M 46 27 L 38 29"
                  fill="none"
                  stroke="#3d2f0a"
                  stroke-width="1.6"
                  stroke-linecap="round"
                />
                <ellipse cx="27" cy="31" rx="2.8" ry="3.5" fill="#3d2f0a" />
                <ellipse cx="41" cy="31" rx="2.8" ry="3.5" fill="#3d2f0a" />
                <path
                  d="M 28 41 Q 34 37 40 41"
                  fill="none"
                  stroke="#5c4510"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </g>
            </g>
          </g>
        </g>
      </g>
    </svg>
    <script>
      (function () {
        const ball = document.getElementById('ball-hit');
        const petFloat = document.getElementById('pet-float');
        const petFace = document.getElementById('pet-face');
        if (!ball || !petFloat || !petFace) return;

        const embedParams =
          typeof window.__EMBED_PARAMS === 'object' && window.__EMBED_PARAMS
            ? window.__EMBED_PARAMS
            : Object.fromEntries(new URLSearchParams(location.search));
        const forcedState = embedParams.state || '';
        const interactive = embedParams.interactive !== '0';
        const autoCycle = embedParams.auto !== '0';

        document.body.classList.add('is-visible');
        ball.setAttribute('title', interactive ? '官网演示 · 拖动 / 单击体验' : 'SYC-TOOL 悬浮球');

        const CLICK_THRESHOLD = 6;
        const SLEEP_IDLE_MS = 26000;
        const ANGRY_DRAG_SPEED = 22;
        const ANGRY_DURATION_MS = 2200;
        const LOOK_MAX_PX = 5;
        const LOOK_RADIUS = 130;
        const WAKE_MOUSE_RADIUS = 160;

        let pointerId = null;
        let startX = 0;
        let startY = 0;
        let lastX = 0;
        let lastY = 0;
        let dragged = false;
        let happyTimer = 0;
        let sleepTimer = 0;
        let angryTimer = 0;
        let hopLoopTimer = 0;
        let lookX = 0;
        let lookY = 0;
        let lockedState = false;

        const LOOK_PREVIEW_X = 4.2;
        const LOOK_PREVIEW_Y = -3;
        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        function clearMood() {
          document.body.classList.remove('is-sleep', 'is-angry', 'is-happy', 'is-dragging');
        }

        function applyForcedState(state) {
          clearMood();
          if (state === 'sleep') document.body.classList.add('is-sleep');
          else if (state === 'angry') document.body.classList.add('is-angry');
          else if (state === 'happy') document.body.classList.add('is-happy');
          else if (state === 'drag') document.body.classList.add('is-dragging');
          applyLook();
        }

        function touchActivity() {
          if (lockedState) return;
          if (document.body.classList.contains('is-sleep')) {
            document.body.classList.remove('is-sleep');
          }
          if (interactive && !forcedState) scheduleSleep();
        }

        function scheduleSleep() {
          window.clearTimeout(sleepTimer);
          if (reducedMotion || lockedState) return;
          sleepTimer = window.setTimeout(() => {
            if (
              document.body.classList.contains('is-visible') &&
              !document.body.classList.contains('is-dragging') &&
              !document.body.classList.contains('is-angry') &&
              !document.body.classList.contains('is-happy')
            ) {
              document.body.classList.add('is-sleep');
            }
          }, SLEEP_IDLE_MS);
        }

        function triggerAngry() {
          if (reducedMotion || lockedState) return;
          touchActivity();
          document.body.classList.remove('is-sleep');
          document.body.classList.add('is-angry');
          window.clearTimeout(angryTimer);
          angryTimer = window.setTimeout(() => {
            if (!lockedState) document.body.classList.remove('is-angry');
            scheduleSleep();
          }, ANGRY_DURATION_MS);
        }

        function applyLook() {
          if (reducedMotion || document.body.classList.contains('is-sleep')) {
            petFace.setAttribute('transform', '');
            return;
          }
          petFace.setAttribute(
            'transform',
            'translate(' + lookX.toFixed(2) + ' ' + lookY.toFixed(2) + ')'
          );
        }

        function updateLookFromDelta(dx, dy) {
          if (
            document.body.classList.contains('is-dragging') ||
            document.body.classList.contains('is-sleep') ||
            document.body.classList.contains('is-angry')
          ) {
            return;
          }
          const dist = Math.hypot(dx, dy);
          if (dist < WAKE_MOUSE_RADIUS && interactive && !lockedState) {
            touchActivity();
          }
          const factor = Math.min(dist / LOOK_RADIUS, 1);
          if (dist < 2) {
            lookX *= 0.65;
            lookY *= 0.65;
          } else {
            const angle = Math.atan2(dy, dx);
            lookX = Math.cos(angle) * LOOK_MAX_PX * factor;
            lookY = Math.sin(angle) * LOOK_MAX_PX * factor;
          }
          applyLook();
        }

        function triggerHop() {
          if (reducedMotion) return;
          document.body.classList.remove('is-happy');
          void petFloat.offsetWidth;
          document.body.classList.add('is-happy');
          window.setTimeout(() => {
            if (!document.body.classList.contains('is-happy')) return;
            if (!lockedState && forcedState !== 'happy') {
              document.body.classList.remove('is-happy');
            }
          }, 680);
        }

        function stopHappyPreviewLoop() {
          window.clearTimeout(hopLoopTimer);
          hopLoopTimer = 0;
          document.body.classList.remove('is-happy');
        }

        function startHappyPreviewLoop() {
          stopHappyPreviewLoop();
          if (reducedMotion) return;
          function tick() {
            triggerHop();
            hopLoopTimer = window.setTimeout(tick, 2000);
          }
          tick();
        }

        function scheduleHappy() {
          if (reducedMotion || lockedState || !interactive) return;
          window.clearTimeout(happyTimer);
          const delay = 5000 + Math.random() * 7000;
          happyTimer = window.setTimeout(() => {
            if (
              document.body.classList.contains('is-visible') &&
              !document.body.classList.contains('is-dragging') &&
              !document.body.classList.contains('is-sleep') &&
              !document.body.classList.contains('is-angry')
            ) {
              triggerHop();
              touchActivity();
            }
            scheduleHappy();
          }, delay);
        }

        function setDemoState(state) {
          window.clearTimeout(sleepTimer);
          window.clearTimeout(happyTimer);
          stopHappyPreviewLoop();

          if (!state || state === 'awake') {
            lockedState = false;
            clearMood();
            lookX = 0;
            lookY = 0;
            applyLook();
            if (interactive && !forcedState) {
              scheduleSleep();
              scheduleHappy();
            }
            return;
          }

          if (state === 'look') {
            lockedState = !interactive;
            clearMood();
            if (!interactive) {
              lookX = LOOK_PREVIEW_X;
              lookY = LOOK_PREVIEW_Y;
            } else {
              lookX = LOOK_PREVIEW_X * 0.65;
              lookY = LOOK_PREVIEW_Y * 0.65;
            }
            applyLook();
            return;
          }

          if (state === 'happy') {
            lockedState = false;
            clearMood();
            lookX = 0;
            lookY = 0;
            applyLook();
            if (!interactive) {
              startHappyPreviewLoop();
            } else {
              triggerHop();
            }
            return;
          }

          lockedState = true;
          lookX = 0;
          lookY = 0;
          applyForcedState(state);
          applyLook();
        }

        if (forcedState) {
          setDemoState(forcedState === 'awake' ? '' : forcedState);
        } else if (interactive) {
          scheduleSleep();
          scheduleHappy();
        }

        window.addEventListener('message', (e) => {
          const data = e.data;
          if (!data || data.type !== 'float-ball') return;
          if (data.action === 'setState') setDemoState(data.state || 'awake');
          if (data.action === 'hop') triggerHop();
          if (data.action === 'look' && typeof data.dx === 'number') {
            updateLookFromDelta(data.dx, data.dy || 0);
          }
        });

        if (window.parent !== window) {
          window.parent.postMessage({ type: 'float-ball-ready' }, '*');
        }

        if (!interactive) return;

        function onPointerMove(e) {
          if (e.pointerId !== pointerId) return;
          const dx = e.screenX - lastX;
          const dy = e.screenY - lastY;
          lastX = e.screenX;
          lastY = e.screenY;

          const totalDx = e.screenX - startX;
          const totalDy = e.screenY - startY;
          if (Math.abs(totalDx) > CLICK_THRESHOLD || Math.abs(totalDy) > CLICK_THRESHOLD) {
            dragged = true;
            if (!lockedState) {
              document.body.classList.add('is-dragging');
              document.body.classList.remove('is-sleep');
            }
          }

          if (dragged && !lockedState) {
            const speed = Math.hypot(dx, dy);
            if (speed >= ANGRY_DRAG_SPEED) triggerAngry();
          }
        }

        function endDrag(e) {
          if (e.pointerId !== pointerId) return;
          document.body.classList.remove('is-dragging');
          document.removeEventListener('pointermove', onPointerMove);
          document.removeEventListener('pointerup', endDrag);
          document.removeEventListener('pointercancel', endDrag);
          try {
            ball.releasePointerCapture(e.pointerId);
          } catch (err) {
            /* ignore */
          }

          if (!dragged && !lockedState && !reducedMotion) {
            triggerHop();
            touchActivity();
          } else if (dragged) {
            touchActivity();
          }

          pointerId = null;
          dragged = false;
          applyLook();
        }

        ball.addEventListener('pointerdown', (e) => {
          if (e.button !== 0 || !interactive) return;
          e.preventDefault();
          touchActivity();
          pointerId = e.pointerId;
          startX = e.screenX;
          startY = e.screenY;
          lastX = e.screenX;
          lastY = e.screenY;
          dragged = false;
          try {
            ball.setPointerCapture(e.pointerId);
          } catch (err) {
            /* ignore */
          }
          document.addEventListener('pointermove', onPointerMove);
          document.addEventListener('pointerup', endDrag);
          document.addEventListener('pointercancel', endDrag);
        });

        ball.addEventListener('pointerenter', () => {
          touchActivity();
          if (reducedMotion || document.body.classList.contains('is-dragging')) return;
          petFloat.style.animationDuration = '2.2s';
        });
        ball.addEventListener('pointerleave', () => {
          petFloat.style.animationDuration = '';
        });
      })();
    </script>
  </body>
</html>
